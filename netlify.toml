[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

[[redirects]]
  from = "/api/trend"
  to = "/.netlify/functions/trend"
  status = 200

[[redirects]]
  from = "/api/instagram"
  to = "/.netlify/functions/instagram"
  status = 200
